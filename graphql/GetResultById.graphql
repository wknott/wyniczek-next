query GetResultById($id: String!) {
	result(id: $id) {
		id
		createdAt
		playingTime
		game {
			id
			name
			thumbnailUrl
		}
		expansions {
			id
			name
		}
		images {
			id
			url
			key
			order
		}
		scores {
			id
			player {
				id
				name
			}
			points {
				id
				value
				pointCategory {
					id
					name
				}
			}
		}
	}
}
