mutation CreateResult($input: CreateResultInput!) {
	createResult(createResultInput: $input) {
		id
		createdAt
		playingTime
		game {
			id
			name
		}
		images {
			id
			url
			key
			order
		}
		scores {
			id
			player {
				id
				name
			}
			points {
				id
				value
				pointCategory {
					id
					name
				}
			}
		}
	}
}
