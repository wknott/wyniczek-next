query ResultsGetList($skip: Int, $take: Int, $gameId: String) {
	results(skip: $skip, take: $take, gameId: $gameId) {
		items {
			id
			gameId
			createdAt
			playingTime
			game {
				id
				name
				thumbnailUrl
			}
			expansions {
				id
				name
			}
			scores {
				player {
					name
				}
				points {
					value
				}
			}
		}
		total
	}
}
