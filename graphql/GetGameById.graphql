query GetGameById($id: String!) {
	game(id: $id) {
		id
		name
		thumbnailUrl
		minPlayers
		maxPlayers
		bggRank
		bggWeight
		lastPlayedAt
		inCollection
		manualUrl
		pointCategories {
			id
			name
			order
		}
		expansions {
			id
			name
			pointCategories {
				id
				name
				order
			}
		}
		records {
			totalPoints
			createdAt
			resultId
			player {
				id
				name
			}
			expansions {
				id
				name
			}
		}
		playerStats {
			wins
			totalGames
			player {
				id
				name
			}
		}
	}
}
